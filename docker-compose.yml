
# docker-compose.physical.yml
# ─────────────────────────────────────────────────────────────────────
# Orchestrator-only stack targeting the PHYSICAL TurtleBot3.
# Prerequisites:
#   - Physical TurtleBot3 running ROS2 Humble on DDS domain 184
#   - rosbridge_server running either on the robot or in the rosbridge
#     service below (set ROSBRIDGE_HOST in the orchestrator env if external)
#
# Usage:
#   docker compose -f docker-compose.physical.yml up
#
# To switch to local DDS (no rosbridge), change agenticros.json:
#   { "transport": { "mode": "local" }, "local": { "domainId": 184 } }
# ─────────────────────────────────────────────────────────────────────

services:
  # ─── CogniBot Orchestrator ─────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    image: cognibot/orchestrator:humble
    container_name: cognibot_orchestrator
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=184
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///app/config/cyclonedds.xml
      - COGNIBOT_CONFIG_PATH=/app/config/cognibot.env
      - AGENTICROS_CONFIG_PATH=/app/config/agenticros.json
    volumes:
      - ./cognibot:/app/cognibot        # live-reload Python source
      - ./skills:/app/skills            # live-reload skills/SOUL.md
      - ./config:/app/config            # live-reload agenticros.json, cognibot.env
    depends_on:
      rosbridge:
        condition: service_started
    stdin_open: true
    tty: true

  # ─── rosbridge sidecar ─────────────────────────────────────────────
  # Only needed when using transport.mode = "rosbridge".
  # Comment out this service (and the depends_on above) when using
  # transport.mode = "local" with rclnodejs direct DDS.
  rosbridge:
    build:
      context: .
      dockerfile: Dockerfile.remote
    image: agenticros/ros2:latest
    container_name: cognibot_rosbridge
    network_mode: host
    ipc: host
    pid: host
    stdin_open: true
    tty: true
    environment:
      - ROS_DOMAIN_ID=184
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///root/turtlebot3_ws/src/cyclonedds.xml
    volumes:
      - ./cyclonedds.xml:/root/turtlebot3_ws/src/cyclonedds.xml:ro
